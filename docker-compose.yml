services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-true}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      VITE_API_PROXY_TARGET: http://backend:${BACKEND_PORT:-3000}
    depends_on:
      - backend
    restart: unless-stopped
